<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claw Agent</title>
    <style>
      :root {
        --bg: #f5efe3;
        --panel: #fffaf0;
        --line: #d5c7ad;
        --text: #1f1a14;
        --muted: #76695a;
        --accent: #bb4d00;
        --accent-soft: #ffe2cc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, #fff7d6, transparent 28%),
          linear-gradient(135deg, #f8f2e8, #eadcc4);
      }

      .shell {
        max-width: 920px;
        margin: 40px auto;
        padding: 24px;
      }

      .panel {
        background: rgba(255, 250, 240, 0.92);
        border: 1px solid var(--line);
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(68, 43, 12, 0.12);
      }

      .hero {
        padding: 28px 28px 20px;
        border-bottom: 1px solid var(--line);
      }

      .hero h1 {
        margin: 0;
        font-size: 36px;
      }

      .hero p {
        margin: 10px 0 0;
        color: var(--muted);
      }

      .messages {
        min-height: 420px;
        max-height: 60vh;
        overflow-y: auto;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .message {
        max-width: 82%;
        padding: 14px 16px;
        border-radius: 18px;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .message.user {
        align-self: flex-end;
        background: var(--accent);
        color: white;
      }

      .message.assistant {
        align-self: flex-start;
        background: var(--accent-soft);
      }

      .message.loading {
        align-self: flex-start;
        background: #f2e4d4;
        color: var(--muted);
      }

      .loading-dots::after {
        content: '';
        display: inline-block;
        width: 1.4em;
        text-align: left;
        animation: dots 1.2s steps(4, end) infinite;
      }

      .composer {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 12px;
        padding: 20px 24px 24px;
        border-top: 1px solid var(--line);
      }

      textarea,
      button {
        border-radius: 16px;
        border: 1px solid var(--line);
        font: inherit;
      }

      textarea {
        min-height: 84px;
        padding: 14px 16px;
        resize: vertical;
        background: white;
      }

      button {
        padding: 0 18px;
        min-width: 108px;
        background: white;
        color: var(--text);
        cursor: pointer;
      }

      button.primary {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .hint {
        padding: 0 24px 24px;
        color: var(--muted);
        font-size: 14px;
      }

      @keyframes dots {
        0% {
          content: '';
        }

        25% {
          content: '.';
        }

        50% {
          content: '..';
        }

        75% {
          content: '...';
        }

        100% {
          content: '';
        }
      }

      @media (max-width: 720px) {
        .shell {
          margin: 0;
          padding: 12px;
        }

        .hero h1 {
          font-size: 30px;
        }

        .composer {
          grid-template-columns: 1fr;
        }

        .message {
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="panel">
        <div class="hero">
          <h1>Claw Agent</h1>
          <p>浏览器端对话页面。</p>
        </div>
        <div id="messages" class="messages"></div>
        <div class="composer">
          <textarea id="input" placeholder="输入你的问题，或使用语音输入"></textarea>
          <button id="voiceButton" type="button">语音输入</button>
          <button id="sendButton" class="primary" type="button">发送</button>
        </div>
        <div class="hint">API: <code>http://localhost:3000/api/chat</code></div>
      </div>
    </div>

    <script>
      const messagesEl = document.getElementById('messages');
      const inputEl = document.getElementById('input');
      const sendButton = document.getElementById('sendButton');
      const voiceButton = document.getElementById('voiceButton');
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const history = [];

      function appendMessage(role, text) {
        const item = document.createElement('div');
        item.className = `message ${role}`;
        item.textContent = text;
        messagesEl.appendChild(item);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return item;
      }

      function appendLoadingMessage() {
        const item = document.createElement('div');
        item.className = 'message assistant loading';
        item.innerHTML = '<span class="loading-dots">Agent 正在执行</span>';
        messagesEl.appendChild(item);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return item;
      }

      async function sendMessage() {
        const message = inputEl.value.trim();

        if (!message) {
          return;
        }

        appendMessage('user', message);
        history.push({ role: 'user', content: message });
        inputEl.value = '';
        sendButton.disabled = true;
        voiceButton.disabled = true;
        const loadingMessage = appendLoadingMessage();

        try {
          const response = await fetch('http://localhost:3000/api/chat', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ message, history: history.slice(0, -1) }),
          });
          const data = await response.json();
          const reply = data.reply || data.error || '未返回结果';
          loadingMessage.remove();
          appendMessage('assistant', reply);
          history.push({ role: 'assistant', content: reply });
        } catch (error) {
          const reply = `请求失败: ${error.message}`;
          loadingMessage.remove();
          appendMessage('assistant', reply);
          history.push({ role: 'assistant', content: reply });
        } finally {
          sendButton.disabled = false;
          if (SpeechRecognition) {
            voiceButton.disabled = false;
          }
          inputEl.focus();
        }
      }

      sendButton.addEventListener('click', sendMessage);

      inputEl.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });

      if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN';
        recognition.continuous = false;
        recognition.interimResults = false;

        voiceButton.addEventListener('click', () => {
          recognition.start();
        });

        recognition.onresult = (event) => {
          inputEl.value = event.results[0][0].transcript;
          inputEl.focus();
        };
      } else {
        voiceButton.disabled = true;
        voiceButton.textContent = '语音不可用';
      }
    </script>
  </body>
</html>
